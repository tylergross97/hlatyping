name: Run nf-test HLA-HD (licensed)
on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**/meta.yml"
      - "**/*.md"
      - "**/*.png"
      - "**/*.svg"
  release:
    types: [published]
  workflow_dispatch:

# Cancel if a newer run is started
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  NFT_VER: "0.9.3"
  NFT_WORKDIR: "~"
  NXF_ANSI_LOG: false
  NXF_SINGULARITY_CACHEDIR: ${{ github.workspace }}/.singularity
  NXF_SINGULARITY_LIBRARYDIR: ${{ github.workspace }}/.singularity

jobs:
  nf-test-hlahd:
    name: "HLA-HD tests | ${{ matrix.NXF_VER }} | ${{ matrix.profile }}"
    # Only run if from nf-core repository (not forks) - needed for GPG_PASSPHRASE secret access
    if: "${{ ( github.event_name == 'push' && github.repository == 'nf-core/hlatyping' ) || github.event.pull_request.head.repo.full_name == 'nf-core/hlatyping' }}"
    runs-on:
      - runs-on=${{ github.run_id }}-nf-test-hlahd
      - runner=4cpu-linux-x64
    strategy:
      fail-fast: false
      matrix:
        profile: [docker]
        NXF_VER:
          - "25.04.0"
          - "latest-everything"
    env:
      NXF_ANSI_LOG: false

    steps:
      - name: Clean Workspace
        run: |
          ls -la ./
          rm -rf ./* || true
          rm -rf ./.??* || true
          ls -la ./

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Download and decrypt HLA-HD
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          # Download encrypted HLA-HD tarball from test-datasets
          curl -L -o hlahd.1.7.1.tar.gz.gpg https://raw.githubusercontent.com/nf-core/test-datasets/hlatyping/software/hlahd.1.7.1.tar.gz.gpg

          # Decrypt the tarball using GPG with the passphrase from secrets
          gpg --batch --yes --pinentry-mode=loopback --passphrase "${{ secrets.GPG_PASSPHRASE }}" --output ${GITHUB_WORKSPACE}/hlahd.1.7.1.tar.gz --decrypt hlahd.1.7.1.tar.gz.gpg

          # Verify the file was created
          ls -lh ${GITHUB_WORKSPACE}/hlahd.1.7.1.tar.gz

          # Create a custom config file to override the hlahd_path parameter
          cat > ${GITHUB_WORKSPACE}/hlahd_ci.config <<EOF
          params {
              hlahd_path = '${GITHUB_WORKSPACE}/hlahd.1.7.1.tar.gz'
          }
          EOF

          cat ${GITHUB_WORKSPACE}/hlahd_ci.config

      - name: Setup Nextflow
        uses: nf-core/setup-nextflow@v2
        with:
          version: "${{ matrix.NXF_VER }}"

      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6
        with:
          python-version: "3.14"

      - name: Install nf-test
        uses: nf-core/setup-nf-test@v1
        with:
          version: "${{ env.NFT_VER }}"
          install-pdiff: true

      - name: Run nf-test for hlahd profile
        continue-on-error: ${{ matrix.NXF_VER == 'latest-everything' }}
        env:
          NFT_WORKDIR: ${{ env.NFT_WORKDIR }}
          NXF_VERSION: ${{ matrix.NXF_VER }}
        run: |
          nf-test test \
            tests/hlahd.nf.test \
            --profile=+${{ matrix.profile }} \
            --verbose \
            --tap=test_hlahd.tap \
            -c ${GITHUB_WORKSPACE}/hlahd_ci.config

      - name: Run nf-test for optitype_hlahd profile
        continue-on-error: ${{ matrix.NXF_VER == 'latest-everything' }}
        env:
          NFT_WORKDIR: ${{ env.NFT_WORKDIR }}
          NXF_VERSION: ${{ matrix.NXF_VER }}
        run: |
          nf-test test \
            tests/optitype_hlahd.nf.test \
            --profile=+${{ matrix.profile }} \
            --verbose \
            --tap=test_optitype_hlahd.tap \
            -c ${GITHUB_WORKSPACE}/hlahd_ci.config

      - name: Generate test summary
        if: always()
        run: |
          echo "# 🚀 HLA-HD nf-test results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Test Name | Profile | NXF Version |" >> $GITHUB_STEP_SUMMARY
          echo "|:------:|-----------|---------|-------------|" >> $GITHUB_STEP_SUMMARY

          # Process hlahd test results
          if [ -f test_hlahd.tap ]; then
            while IFS= read -r line; do
              if [[ $line =~ ^ok ]]; then
                test_name="${line#ok }"
                test_name="${test_name#* }"
                echo "| ✅ | ${test_name} | ${{ matrix.profile }} | ${{ matrix.NXF_VER }} |" >> $GITHUB_STEP_SUMMARY
              elif [[ $line =~ ^not\ ok ]]; then
                test_name="${line#not ok }"
                test_name="${test_name#* }"
                echo "| ❌ | ${test_name} | ${{ matrix.profile }} | ${{ matrix.NXF_VER }} |" >> $GITHUB_STEP_SUMMARY
              fi
            done < test_hlahd.tap
          fi

          # Process optitype_hlahd test results
          if [ -f test_optitype_hlahd.tap ]; then
            while IFS= read -r line; do
              if [[ $line =~ ^ok ]]; then
                test_name="${line#ok }"
                test_name="${test_name#* }"
                echo "| ✅ | ${test_name} | ${{ matrix.profile }} | ${{ matrix.NXF_VER }} |" >> $GITHUB_STEP_SUMMARY
              elif [[ $line =~ ^not\ ok ]]; then
                test_name="${line#not ok }"
                test_name="${test_name#* }"
                echo "| ❌ | ${test_name} | ${{ matrix.profile }} | ${{ matrix.NXF_VER }} |" >> $GITHUB_STEP_SUMMARY
              fi
            done < test_optitype_hlahd.tap
          fi

      - name: Report test status
        if: ${{ always() }}
        run: |
          if [ -f test_hlahd.tap ] && grep -q "^not ok" test_hlahd.tap; then
            echo "::error::HLA-HD test with ${{ matrix.NXF_VER }} failed"
            if [[ "${{ matrix.NXF_VER }}" != "latest-everything" ]]; then
              exit 1
            fi
          fi
          if [ -f test_optitype_hlahd.tap ] && grep -q "^not ok" test_optitype_hlahd.tap; then
            echo "::error::OptiType+HLA-HD test with ${{ matrix.NXF_VER }} failed"
            if [[ "${{ matrix.NXF_VER }}" != "latest-everything" ]]; then
              exit 1
            fi
          fi

      - name: Clean up
        if: always()
        run: |
          sudo rm -rf /home/ubuntu/tests/
