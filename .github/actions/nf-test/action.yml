name: "nf-test Action"
description: "Runs nf-test with common setup steps"
inputs:
  profile:
    description: "Profile to use"
    required: true
  shard:
    description: "Shard number for this CI job"
    required: true
  total_shards:
    description: "Total number of test shards(NOT the total number of matrix jobs)"
    required: true
  paths:
    description: "Test paths"
    required: true
  tags:
    description: "Tags to pass as argument for nf-test --tag parameter"
    required: false
  hlahd_tests:
    description: "Whether to run HLA-HD tests"
    required: false
    default: "false"
runs:
  using: "composite"
  steps:
    - name: Setup Nextflow
      uses: nf-core/setup-nextflow@v2
      with:
        version: "${{ env.NXF_VERSION }}"

    - name: Set up Python
      uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6
      with:
        python-version: "3.14"

    - name: Install nf-test
      uses: nf-core/setup-nf-test@v1
      with:
        version: "${{ env.NFT_VER }}"
        install-pdiff: true

    - name: Setup apptainer
      if: contains(inputs.profile, 'singularity')
      uses: eWaterCycle/setup-apptainer@main

    - name: Set up Singularity
      if: contains(inputs.profile, 'singularity')
      shell: bash
      run: |
        mkdir -p $NXF_SINGULARITY_CACHEDIR
        mkdir -p $NXF_SINGULARITY_LIBRARYDIR

    - name: Conda setup
      if: contains(inputs.profile, 'conda')
      uses: conda-incubator/setup-miniconda@505e6394dae86d6a5c7fbb6e3fb8938e3e863830 # v3
      with:
        auto-update-conda: true
        conda-solver: libmamba
        channels: conda-forge
        channel-priority: strict
        conda-remove-defaults: true

    - name: Run nf-test
      shell: bash
      env:
        NFT_WORKDIR: ${{ env.NFT_WORKDIR }}
      run: |
        nf-test test \
          --profile=+${{ inputs.profile }} \
          $(if [ -n "${{ inputs.tags }}" ]; then echo "--tag ${{ inputs.tags }}"; fi) \
          --ci \
          --changed-since HEAD^ \
          --verbose \
          --tap=test.tap \
          --shard ${{ inputs.shard }}/${{ inputs.total_shards }}

          # Save the absolute path of the test.tap file to the output
          echo "tap_file_path=$(realpath test.tap)" >> $GITHUB_OUTPUT

    - name: Download and decrypt HLA-HD
      if: inputs.hlahd_tests == 'true' && (( github.event_name == 'push' && github.repository == 'nf-core/hlatyping' ) || github.event.pull_request.head.repo.full_name == 'nf-core/hlatyping')
      shell: bash
      env:
        GPG_PASSPHRASE: ${{ env.GPG_PASSPHRASE }}
      run: |
        # Download encrypted HLA-HD tarball from test-datasets
        curl -L -o hlahd.1.7.1.tar.gz.gpg https://raw.githubusercontent.com/nf-core/test-datasets/hlatyping/software/hlahd.1.7.1.tar.gz.gpg

        # Decrypt the tarball using GPG with the passphrase from secrets
        gpg --batch --yes --pinentry-mode=loopback --passphrase "$GPG_PASSPHRASE" --output ${GITHUB_WORKSPACE}/hlahd.1.7.1.tar.gz --decrypt hlahd.1.7.1.tar.gz.gpg

        # Verify the file was created
        ls -lh ${GITHUB_WORKSPACE}/hlahd.1.7.1.tar.gz

        # Create a custom config file to override the hlahd_path parameter
        cat > ${GITHUB_WORKSPACE}/hlahd_ci.config <<EOF
        params {
            hlahd_path = '${GITHUB_WORKSPACE}/hlahd.1.7.1.tar.gz'
        }
        EOF

        cat ${GITHUB_WORKSPACE}/hlahd_ci.config

    - name: Run nf-test for hlahd profile
      if: inputs.hlahd_tests == 'true' && (( github.event_name == 'push' && github.repository == 'nf-core/hlatyping' ) || github.event.pull_request.head.repo.full_name == 'nf-core/hlatyping')
      shell: bash
      env:
        NFT_WORKDIR: ${{ env.NFT_WORKDIR }}
      run: |
        nf-test test \
          tests/hlahd.nf.test \
          --profile=+${{ inputs.profile }} \
          --verbose \
          --tap=test_hlahd.tap \
          -c ${GITHUB_WORKSPACE}/hlahd_ci.config

    - name: Run nf-test for optitype_hlahd profile
      if: inputs.hlahd_tests == 'true' && (( github.event_name == 'push' && github.repository == 'nf-core/hlatyping' ) || github.event.pull_request.head.repo.full_name == 'nf-core/hlatyping')
      shell: bash
      env:
        NFT_WORKDIR: ${{ env.NFT_WORKDIR }}
      run: |
        nf-test test \
          tests/optitype_hlahd.nf.test \
          --profile=+${{ inputs.profile }} \
          --verbose \
          --tap=test_optitype_hlahd.tap \
          -c ${GITHUB_WORKSPACE}/hlahd_ci.config

    - name: Generate test summary
      if: always()
      shell: bash
      run: |
        # Add header if it doesn't exist (using a token file to track this)
        if [ ! -f ".summary_header" ]; then
          echo "# 🚀 nf-test results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Test Name | Profile | Shard |" >> $GITHUB_STEP_SUMMARY
          echo "|:------:|-----------|---------|-------|" >> $GITHUB_STEP_SUMMARY
          touch .summary_header
        fi

        if [ -f test.tap ]; then
          while IFS= read -r line; do
            if [[ $line =~ ^ok ]]; then
              test_name="${line#ok }"
              # Remove the test number from the beginning
              test_name="${test_name#* }"
              echo "| ✅ | ${test_name} | ${{ inputs.profile }} | ${{ inputs.shard }}/${{ inputs.total_shards }} |" >> $GITHUB_STEP_SUMMARY
            elif [[ $line =~ ^not\ ok ]]; then
              test_name="${line#not ok }"
              # Remove the test number from the beginning
              test_name="${test_name#* }"
              echo "| ❌ | ${test_name} | ${{ inputs.profile }} | ${{ inputs.shard }}/${{ inputs.total_shards }} |" >> $GITHUB_STEP_SUMMARY
            fi
          done < test.tap
        else
          echo "| ⚠️ | No test results found | ${{ inputs.profile }} | ${{ inputs.shard }}/${{ inputs.total_shards }} |" >> $GITHUB_STEP_SUMMARY
        fi

        # Process HLA-HD test results if they exist
        if [ -f test_hlahd.tap ]; then
          while IFS= read -r line; do
            if [[ $line =~ ^ok ]]; then
              test_name="${line#ok }"
              test_name="${test_name#* }"
              echo "| ✅ | ${test_name} | ${{ inputs.profile }} | HLA-HD |" >> $GITHUB_STEP_SUMMARY
            elif [[ $line =~ ^not\ ok ]]; then
              test_name="${line#not ok }"
              test_name="${test_name#* }"
              echo "| ❌ | ${test_name} | ${{ inputs.profile }} | HLA-HD |" >> $GITHUB_STEP_SUMMARY
            fi
          done < test_hlahd.tap
        fi

        # Process OptiType+HLA-HD test results if they exist
        if [ -f test_optitype_hlahd.tap ]; then
          while IFS= read -r line; do
            if [[ $line =~ ^ok ]]; then
              test_name="${line#ok }"
              test_name="${test_name#* }"
              echo "| ✅ | ${test_name} | ${{ inputs.profile }} | OptiType+HLA-HD |" >> $GITHUB_STEP_SUMMARY
            elif [[ $line =~ ^not\ ok ]]; then
              test_name="${line#not ok }"
              test_name="${test_name#* }"
              echo "| ❌ | ${test_name} | ${{ inputs.profile }} | OptiType+HLA-HD |" >> $GITHUB_STEP_SUMMARY
            fi
          done < test_optitype_hlahd.tap
        fi

    - name: Clean up
      if: always()
      shell: bash
      run: |
        sudo rm -rf /home/ubuntu/tests/
